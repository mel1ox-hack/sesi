<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meliox Secure System</title>

<style>
body{
    margin:0;
    font-family:monospace;
    background:#0a0f14;
    color:#00ffff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* GRID BG */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
    linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:-1;
}

.screen{display:none;}
.active{display:block;}

.box{
    padding:20px;
    width:90%;
    max-width:400px;
    border-radius:20px;
    background:rgba(10,20,30,0.9);
    box-shadow:0 0 25px rgba(0,255,255,0.25);
    text-align:center;
}

.input{
    width:90%;
    padding:12px;
    margin:10px;
    background:#000;
    border:1px solid #00ffff;
    color:#00ffff;
    border-radius:12px;
}

.row{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.btn{
    padding:10px 14px;
    border:1px solid #00ffff;
    border-radius:12px;
    cursor:pointer;
}

.keyBox{
    margin-top:20px;
    padding:15px;
    border:1px solid #00ffff;
    border-radius:12px;
}

.copy{
    margin-top:10px;
    padding:12px;
    background:#00ffff;
    color:#000;
    border-radius:12px;
    cursor:pointer;
}

.timer{ margin-top:10px; color:#00ff88; }

/* VERIFY */
#verifyScreen{
    position:fixed;
    inset:0;
    background:#0b0f14;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

.verifyBox{
    border:1px solid #333;
    padding:20px;
    width:300px;
    border-radius:10px;
    background:#111;
}

.barWrap{
    width:100%;
    height:5px;
    background:#222;
    margin-top:20px;
}

.bar{
    width:0%;
    height:100%;
    background:#00ffff;
}

/* SENSI LOADING */
#sensiLoading{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
</style>
</head>

<body>

<!-- VERIFY SCREEN -->
<div id="verifyScreen" style="display:none;">
<div class="verifyBox">
<h3>Checking your browser...</h3>
<p>Please wait while we verify you are human</p>
<div class="barWrap">
<div class="bar" id="verifyBar"></div>
</div>
</div>
</div>

<!-- KEY SCREEN -->
<div id="keyScreen" class="screen active">
<div class="box">

<h2>AIMLOCK+NO RECOIL SENSI🎯</h2>

<input id="keyInput" class="input" placeholder="ENTER KEY">

<div class="row">
<div class="btn" onclick="unlock()">UNLOCK</div>
<div class="btn" onclick="pasteKey()">PASTE KEY</div>
<div class="btn" onclick="goGenerate()">GENERATE KEY</div>
</div>

<div class="keyBox" id="keyDisplay">NO KEY GENERATED</div>

<div class="copy" onclick="copyKey()">COPY KEY</div>

<div class="timer" id="timer"></div>

<p id="status"></p>

</div>
</div>

<!-- SENSI -->
<div id="sensiScreen" class="screen">
<div class="box">
<h2>SENSI SYSTEM ⚡</h2>
<div class="btn" onclick="genSensi()">GENERATE SENSI</div>
<div id="device"></div>
<div id="result"></div>
</div>
</div>

<!-- SENSI LOADING -->
<div id="sensiLoading" style="display:none;">
<h3>Detecting device...</h3>
<div class="bar" id="sensiBar"></div>
</div>

<script>

/* GENERATE KEY */
function generateKey(){
let k="MEL1OX-AIMBOT-"+Math.random().toString(36).substring(2,8).toUpperCase();
let exp=Date.now()+60000;

localStorage.setItem("key",k);
localStorage.setItem("exp",exp);

document.getElementById("keyDisplay").innerText=k;
startTimer();
}

/* TIMER */
function startTimer(){
let t=setInterval(()=>{
let exp = localStorage.getItem("exp");
let left = exp - Date.now();

if(left <= 0){
clearInterval(t);
localStorage.removeItem("key");
localStorage.removeItem("exp");
location.reload();
}

document.getElementById("timer").innerText = Math.floor(left/1000)+"s";
},1000);
}

/* GENERATE BTN */
function goGenerate(){
localStorage.setItem("startTime", Date.now());
window.location.href="https://alpharede.com/E3tBOqLO9bC";
}

/* RETURN CHECK */
let start = localStorage.getItem("startTime");

if(start){
let diff=(Date.now()-start)/1000;

if(diff > 200){ // 5 mins

document.getElementById("verifyScreen").style.display="flex";

let bar=document.getElementById("verifyBar");
let p=0;

let v=setInterval(()=>{
p+=5;
bar.style.width=p+"%";

if(p>=100){
clearInterval(v);
document.getElementById("verifyScreen").style.display="none";
generateKey();
}
},150);
}

localStorage.removeItem("startTime");
}

/* COPY */
function copyKey(){
let k=document.getElementById("keyDisplay").innerText;
navigator.clipboard.writeText(k);
document.querySelector(".copy").innerText="COPIED";
setTimeout(()=>{document.querySelector(".copy").innerText="COPY KEY";},2000);
}

/* PASTE */
function pasteKey(){
let t=prompt("Paste key");
if(t) document.getElementById("keyInput").value=t;
}

/* 🔥 FIXED UNLOCK */
function unlock(){
let input=document.getElementById("keyInput").value;
let key=localStorage.getItem("key");
let exp=localStorage.getItem("exp");

// expired check
if(!exp || Date.now() > exp){
document.getElementById("status").innerText="KEY EXPIRED ❌";
localStorage.removeItem("key");
localStorage.removeItem("exp");
return;
}

// correct key
if(input === key){
document.getElementById("keyScreen").classList.remove("active");
document.getElementById("sensiScreen").classList.add("active");
}else{
document.getElementById("status").innerText="INVALID KEY ❌";
}
}

/* DEVICE */
function getDevice(){
let ua=navigator.userAgent;
if(/Android/i.test(ua)) return "Android";
if(/IOS/i.test(ua)) return "IOS";
return "Device";
}

/* SENSI */
function genSensi(){
document.getElementById("sensiScreen").style.display="none";
document.getElementById("sensiLoading").style.display="flex";

let bar=document.getElementById("sensiBar");
let p=0;

let int=setInterval(()=>{
p+=5;
bar.style.width=p+"%";

if(p>=100){
clearInterval(int);
document.getElementById("sensiLoading").style.display="none";
document.getElementById("sensiScreen").style.display="block";

document.getElementById("device").innerText="Device: "+getDevice();

document.getElementById("result").innerHTML=
"General: "+(180+Math.random()*20|0)+"<br>"+
"Red Dot: "+(180+Math.random()*20|0)+"<br>"+
"2x: "+(180+Math.random()*20|0)+"<br>"+
"4x: "+(180+Math.random()*20|0);
}
},100);
}

</script>

</body>
</html>
